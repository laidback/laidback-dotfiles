format = """
$shell$shlvl\
$directory \
$git_branch$git_status$git_commit \
$env_var \
$custom\
$container
$character
"""

right_format = """
$cmd_duration \
$python \
$docker_context \
$kubernetes | \
$aws | \
$username[@](dimmed yellow)$hostname \
"""
continuation_prompt = ">>"
add_newline = true

[line_break]
disabled = false

[directory]
truncate_to_repo = true
repo_root_style = 'underline cyan'
format = '[$path]($style) [$read_only]($read_only_style)'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)'

[git_branch]
symbol = ' '
truncation_length = 32
truncation_symbol = '...'
#ignore_branches = ['master', 'main']

[git_status]
format = '$all_status$ahead_behind'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = ''
untracked = '?'
stashed = ''
modified = '*(red)'
staged = '+'
renamed = '"'
deleted = 'x'
ignore_submodules = false

[git_commit]
commit_hash_length = 4
tag_symbol = '🔖 '

[docker_context]
format = 'via [🐋 $context]($style) '
style = 'blue bold'

[username]
style_user = 'green bold'
style_root = 'red bold'
format = '[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_symbol = '->'
ssh_only = false
format = '[$hostname](bold yellow) '
trim_at = '.hilti.com'
disabled = false

[kubernetes]
symbol = '[󱃾](cyan bold)'
format = '\($symbol|[$user](blue)@[$context](blue)/[$namespace](red)\)'
disabled = false

[aws]
symbol = ''
format = '[$symbol ($profile)(\($region\))]($style)'
style = 'bold blue'

[custom.GITLAB]
symbol = '\([ ](orange bold)'
command = 'echo "$symbol|$GITLAB_REPO|$GITLAB_GROUP)"'
when = '[ -n "$GITLAB_REPO" ]'
detect_folders = [".git"]
description = 'gitlab module'
# ── Additional context modules ─────────────────────────────────────

[python]
format = '[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style) '
symbol = '🐍 '
style = 'yellow bold'

[env_var.MISE_ENV]
symbol = ''
format = '[$symbol$env_value]($style) '
style = 'dimmed green'

[cmd_duration]
min_time = 3_000
format = '[$duration]($style) '
style = 'dimmed yellow'

[container]
format = '[$symbol]($style) '
symbol = '⬡'
style = 'red dimmed'

# ── Shell + nesting indicators ─────────────────────────────────────
# Show which interpreter the prompt belongs to (zsh/bash/fish/...) and how
# deep the shell-in-shell nesting is. Together they make `bash`-from-`zsh`
# (or vice-versa) immediately visible, which is the visual signal the
# directory-aware MOTD intentionally does not provide for human mode.

[shell]
disabled = false
bash_indicator = 'bash'
zsh_indicator = 'zsh'
fish_indicator = 'fish'
powershell_indicator = 'pwsh'
ion_indicator = 'ion'
elvish_indicator = 'elvish'
tcsh_indicator = 'tcsh'
xonsh_indicator = 'xonsh'
cmd_indicator = 'cmd'
nu_indicator = 'nu'
unknown_indicator = 'sh'
format = '[\[$indicator\]]($style) '
style = 'cyan bold'

[shlvl]
# Only show when nested (running a shell inside a shell). SHLVL=1 stays
# clean so a fresh terminal has zero noise.
disabled = false
threshold = 2
symbol = '↕'
format = '[$symbol$shlvl]($style) '
style = 'yellow bold'

