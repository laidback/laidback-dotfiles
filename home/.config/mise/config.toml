# dotfiles/home/.config/mise/config.toml
# Global mise configuration for the user

[tools]
node    = "latest"
python  = "latest"
go      = "latest"
rust    = "latest"
uv      = "latest"
ripgrep = "latest"
fd      = "latest"
bat     = "latest"
delta   = "latest"
zoxide  = "latest"
flux2 = "2.8.3"

[settings]
verbose = false
color = true
auto_install = true

# Source core XDG + Laidback environment in every mise-managed shell
[env]
_.source = "{{env.HOME}}/.config/shell/env.sh"
