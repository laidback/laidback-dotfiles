# dotfiles/home/.config/mise/config.toml
# Global mise configuration for the user

[tools]
node = "latest"
python = "latest"
go = "latest"
rust = "latest"
uv = "latest"
ripgrep = "latest"
fd = "latest"
bat = "latest"
delta = "latest"
zoxide = "latest"
flux2 = "2.8.3"
gum = "0.17.0"
helm = "4.1.3"
fx = "39.2.0"
age = "1.3.1"
sops = "3.12.2"
k9s = "0.51.0"
crossplane = "2.2.0"
terraform = "1.14.7"

[settings]
verbose = false
color = true
auto_install = true

# Source core XDG + Laidback environment in every mise-managed shell
[env]
_.source = "{{env.HOME}}/.config/shell/env.sh"
