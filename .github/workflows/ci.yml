name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"
  IMAGE_NAME: laidback-dotfiles

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Source loop — lint every script, markdown, JSON, workflow, and
  #        Dockerfile without bringing up Docker.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          experimental: "true"

      - name: Install toolchain
        run: mise install --yes

      - name: Shell lint
        run: mise run shell:lint

      - name: Docs lint
        run: mise run docs:lint

      - name: JSON lint
        run: mise run json:lint

      - name: Dockerfile lint
        run: mise run docker:lint

      - name: CI workflow lint
        run: mise run ci:workflow-validate

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Docker test — builds the test stage which runs the full bootstrap
  #        + shell smoke tests inside a clean Debian container.
  # ─────────────────────────────────────────────────────────────────────────
  docker-test:
    name: Docker — Install & Validate Shells
    runs-on: ubuntu-24.04
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test stage (install + shell validation)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — run status and doctor inside container
        run: |
          docker run --rm "${{ env.IMAGE_NAME }}:test-${{ github.sha }}" \
            bash -lc '
              bash "$HOME/.config/mise/tasks/dotfiles/status.sh"
              bash "$HOME/.config/mise/tasks/dotfiles/doctor.sh"
            '

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Docker build — build the runtime image and optionally push to
  #        GHCR on main branch merges.
  # ─────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build Runtime Image
    runs-on: ubuntu-24.04
    needs: docker-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Tarball — build the distributable dotfiles archive.
  # ─────────────────────────────────────────────────────────────────────────
  build-tarball:
    name: Build Tarball
    runs-on: ubuntu-24.04
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3
        with:
          experimental: "true"

      - name: Install toolchain
        run: mise install --yes

      - name: Build distributable tarball
        run: mise run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotfiles-${{ github.sha }}
          path: dist/
          retention-days: 14
