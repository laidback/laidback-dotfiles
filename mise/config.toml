[tools]
node = "lts"
shfmt = "3.12.0"
shellcheck = "0.10.0"
actionlint = "1.7.8"
hadolint = "2.12.0"
"npm:markdownlint-cli" = "0.45.0"
act = "0.2.82"
age = "1.2.1"
sops = "3.9.1"
gh = "2.76.2"
glab = "1.66.0"
jq = "1.8.1"
yq = "4.45.4"
delta = "latest"

[settings]
experimental = true

[tasks."bootstrap"]
description = "Stow home dotfiles and install global mise tasks"
run = "bash ./mise/tasks/repo/task-runner.sh bootstrap"

[tasks."status"]
description = "Show bootstrap and environment status"
run = "bash ./mise/tasks/repo/task-runner.sh status"

[tasks."doctor"]
description = "Verify bootstrap and toolchain health"
run = "bash ./mise/tasks/repo/task-runner.sh doctor"

[tasks."fmt"]
description = "Format repository shell scripts"
run = '''bash -c '
set -euo pipefail
_files="$(find mise/tasks -type f -name "*.sh" -print 2>/dev/null || true)"
shfmt -w install.sh home/.config/shell/env.sh home/.config/shell/motd.sh home/.profile home/.zprofile home/.bashrc home/.bash_profile home/.bashrc.ai home/.bash_profile.ai home/.config/mise/tasks/dotfiles/*.sh home/.config/mise/tasks/projects/*.sh $_files
' '''

[tasks."shell:lint"]
description = "Lint shell scripts"
run = '''bash -c '
set -euo pipefail
_files="$(find mise/tasks -type f -name "*.sh" -print 2>/dev/null || true)"
shellcheck install.sh home/.config/shell/env.sh home/.config/shell/motd.sh home/.config/shell/kube.sh home/.profile home/.zprofile home/.bashrc home/.bash_profile home/.bashrc.ai home/.bash_profile.ai home/.config/mise/tasks/dotfiles/*.sh home/.config/mise/tasks/projects/*.sh $_files
' '''

# Global namespaced mise tasks (auto-discovered after bootstrap stows them):
#   mise run dotfiles:status        — environment + symlink status
#   mise run dotfiles:doctor        — health checks
#   mise run projects:clone <url>   — clone into $XDG_PROJECTS_DIR/<forge>/<group>/<project>
#   mise run projects:fingerprint   — quick project introspection (langs, services, ports)

[tasks."docs:lint"]
description = "Lint repository markdown docs"
run = "markdownlint README.md ARCHITECTURE.md CONFIGURATION.md"

[tasks."json:lint"]
description = "Validate JSON file syntax"
run = "bash ./mise/tasks/repo/task-runner.sh json-lint"

[tasks."docker:lint"]
description = "Lint Dockerfile"
run = "bash ./mise/tasks/repo/task-runner.sh docker-lint"

[tasks."docker:build"]
description = "Build the runtime Docker image (IMAGE=name:tag)"
run = "bash ./mise/tasks/repo/task-runner.sh docker-build"

[tasks."docker:test"]
description = "Build and run the test stage (validates full install + shell smoke tests)"
run = "bash ./mise/tasks/repo/task-runner.sh docker-test"

[tasks."docker:validate"]
description = "Run lint + docker:test (full Docker validation gate)"
depends = ["docker:lint", "docker:test"]
run = "echo 'docker:validate: ok'"

[tasks."docker:run"]
description = "Launch an interactive shell inside the runtime image"
run = "bash ./mise/tasks/repo/task-runner.sh docker-run"

[tasks."docker:push"]
description = "Push image to registry (set IMAGE=registry/repo:tag)"
run = "bash ./mise/tasks/repo/task-runner.sh docker-push"

[tasks."ci:workflow-validate"]
description = "Validate GitHub Actions workflows"
run = "actionlint .github/workflows/*.yml"

[tasks."vscode:tasks-check"]
description = "Ensure VS Code tasks are canonical mise wrappers and cover all repo mise tasks"
run = "bash ./mise/tasks/repo/task-runner.sh vscode-tasks-check"

[tasks."security:sops-check"]
description = "Verify sops and age are installed"
run = "bash ./mise/tasks/repo/task-runner.sh security-sops-check"

# ─── secrets:* — sops/age-managed user environment tokens ────────────────────
# Lifecycle:
#   secrets:init      → one-time: generate age keypair + .sops.yaml
#   secrets:edit      → open the encrypted secrets file in $EDITOR via sops
#   secrets:decrypt   → write plaintext to $LAIDBACK_CONFIG/secrets.env (0600)
#   secrets:encrypt   → re-encrypt plaintext after manual edits (rare)
#   secrets:status    → show which expected variables are present (no values)
#
# All paths live OUTSIDE this repo (under $LAIDBACK_CONFIG = $XDG_CONFIG_HOME/laidback)
# so plaintext secrets cannot be accidentally committed here.

[tasks."secrets:init"]
description = "One-time: generate age keypair and seed sops + secrets layout"
run = "bash ./mise/tasks/repo/task-runner.sh secrets-init"

[tasks."secrets:edit"]
description = "Open encrypted secrets file ($LAIDBACK_CONFIG/secrets.env.sops) in sops"
run = "bash ./mise/tasks/repo/task-runner.sh secrets-edit"

[tasks."secrets:decrypt"]
description = "Decrypt secrets.env.sops to $LAIDBACK_CONFIG/secrets.env (0600); re-source shell to pick up"
run = "bash ./mise/tasks/repo/task-runner.sh secrets-decrypt"

[tasks."secrets:encrypt"]
description = "Re-encrypt $LAIDBACK_CONFIG/secrets.env -> secrets.env.sops (rare; sops:edit is preferred)"
run = "bash ./mise/tasks/repo/task-runner.sh secrets-encrypt"

[tasks."secrets:status"]
description = "Show which expected secret variables are present in current env (values masked)"
run = "bash ./mise/tasks/repo/task-runner.sh secrets-status"

[tasks."lint"]
description = "Run all repository linters"
depends = ["shell:lint", "docs:lint", "json:lint", "docker:lint", "ci:workflow-validate", "vscode:tasks-check"]
run = "echo 'lint: ok'"

[tasks."validate"]
description = "Run full repository validation"
depends = ["doctor", "lint"]
run = "echo 'validate: ok'"

[tasks."build"]
description = "Build distributable dotfiles tarball"
run = "bash ./mise/tasks/repo/task-runner.sh build"

[tasks."test"]
description = "Run standard repository checks"
depends = ["validate"]
run = "echo 'test: ok'"

[tasks."release-check"]
description = "Release gate checks"
depends = ["cycle", "build"]
run = "bash ./mise/tasks/repo/task-runner.sh release-check"

[tasks."release:dry-run"]
description = "Show release actions without changing git state"
run = "bash ./mise/tasks/repo/task-runner.sh release-dry-run"

[tasks."release:tag"]
description = "Create annotated git tag (set TAG=vX.Y.Z)"
run = "bash ./mise/tasks/repo/task-runner.sh release-tag"

[tasks."release:publish"]
description = "Push git tag (set TAG=vX.Y.Z)"
run = "bash ./mise/tasks/repo/task-runner.sh release-publish"

[tasks."ci:act"]
description = "Run CI workflow locally with act"
run = "bash ./mise/tasks/repo/task-runner.sh ci-act"

[tasks."cycle"]
description = "Run full dotfiles source loop (bootstrap + validate, no Docker)"
depends = ["bootstrap", "status", "validate"]
run = "echo 'cycle: ok'"

[tasks."ci:local"]
description = "Full local CI: source loop + Docker test (mirrors GHA)"
depends = ["cycle", "docker:validate"]
run = "echo 'ci:local: ok'"

# compatibility aliases
[tasks."repo:bootstrap"]
description = "Alias"
depends = ["bootstrap"]
run = "true"

[tasks."repo:status"]
description = "Alias"
depends = ["status"]
run = "true"

[tasks."repo:doctor"]
description = "Alias"
depends = ["doctor"]
run = "true"

[tasks."repo:validate"]
description = "Alias"
depends = ["validate"]
run = "true"

[tasks."repo:build"]
description = "Alias"
depends = ["build"]
run = "true"

[tasks."repo:cycle"]
description = "Alias"
depends = ["cycle"]
run = "true"
